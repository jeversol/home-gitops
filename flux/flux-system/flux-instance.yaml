apiVersion: fluxcd.controlplane.io/v1
kind: FluxInstance
metadata:
  name: flux
  namespace: flux-system
spec:
  distribution:
    version: "2.x"
    registry: "ghcr.io/fluxcd"
  components:
    - source-controller
    - kustomize-controller
    - helm-controller
    - notification-controller
  cluster:
    type: kubernetes
    multitenant: false
    networkPolicy: true
    domain: "cluster.local"
  sync:
    kind: GitRepository
    url: "ssh://git@github.com/jeversol/home-gitops.git"
    ref: "refs/heads/main"
    path: "flux"
    pullSecret: "flux-system"
  kustomize:
    patches:
      - patch: |
          - op: replace
            path: /spec/template/spec/containers/0/resources
            value:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 256Mi
        target:
          kind: Deployment
          name: "(helm-controller|source-controller)"
      - patch: |
          - op: replace
            path: /spec/template/spec/containers/0/resources
            value:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 256Mi
        target:
          kind: Deployment
          name: "kustomize-controller"
      - patch: |
          - op: replace
            path: /spec/template/spec/containers/0/resources
            value:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                memory: 128Mi
        target:
          kind: Deployment
          name: "notification-controller"
