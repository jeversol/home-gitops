---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: flux-web-ui-tls
  namespace: flux-system
spec:
  commonName: flux.i.recompiled.org
  secretName: flux-web-ui-tls
  dnsNames:
    - flux.i.recompiled.org
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: flux-web-ui
  namespace: flux-system
  annotations:
    external-dns.alpha.kubernetes.io/expose: "true"
    external-dns.alpha.kubernetes.io/target: traefik.i.recompiled.org
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`flux.i.recompiled.org`)
      kind: Rule
      services:
        - name: flux-operator
          port: 9080
      middlewares:
        - name: traefik-forward-auth
          namespace: traefik
  tls:
    secretName: flux-web-ui-tls
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: flux-web-admin
subjects:
  - kind: Group
    name: flux-web-admin
roleRef:
  kind: ClusterRole
  name: flux-web-admin
  apiGroup: rbac.authorization.k8s.io
