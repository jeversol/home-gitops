---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: snapshot-controller
  namespace: flux-system
spec:
  interval: 30m
  releaseName: snapshot-controller
  targetNamespace: piraeus-datastore
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: snapshot-controller
      version: "5.1.1"
      sourceRef:
        kind: HelmRepository
        name: piraeus-charts
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    installCRDs: true
