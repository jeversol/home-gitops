apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: scrutiny
  namespace: flux-system
spec:
  interval: 15m
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/scrutiny
  prune: true
  components:
    - ../../components/volsync
  wait: true
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  postBuild:
    substituteFrom:
      - kind: Secret
        name: volsync-s3-credentials
    substitute:
      APP: scrutiny
      VOLSYNC_CLAIM: config-scrutiny-0
      VOLSYNC_SCHEDULE: "0 6 * * *"