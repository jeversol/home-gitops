apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: spoolman-bambu
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/spoolman/bambu-spoolman
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: spoolman
  timeout: 5m
  decryption:
    provider: sops
    secretRef:
      name: sops-age
