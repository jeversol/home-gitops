apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: media-overseerr
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/media/overseerr
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  components:
    - ../../../components/volsync
  dependsOn:
    - name: media
  timeout: 5m
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  postBuild:
    substituteFrom:
      - kind: Secret
        name: volsync-s3-credentials
    substitute:
      APP: overseerr
      VOLSYNC_CLAIM: config-overseerr-0
      VOLSYNC_SCHEDULE: "0 5 * * *"
