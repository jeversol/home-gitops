apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: spoolman
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/spoolman
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  components:
    - ../../components/volsync
  wait: true
  timeout: 5m
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  postBuild:
    substituteFrom:
      - kind: Secret
        name: volsync-s3-credentials
    substitute:
      APP: spoolman
      VOLSYNC_CLAIM: data-spoolman-0
      VOLSYNC_SCHEDULE: "0 2 * * *"
      VOLSYNC_NAMESPACE: spoolman
