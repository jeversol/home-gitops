apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: o11y
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/o11y
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  components:
    - ../../components/volsync
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  postBuild:
    substituteFrom:
      - kind: Secret
        name: volsync-s3-credentials
    substitute:
      APP: grafana
      VOLSYNC_CLAIM: kube-prometheus-stack-grafana
      VOLSYNC_SCHEDULE: "0 6 * * *"