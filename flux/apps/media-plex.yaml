apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: media-plex
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/media/plex
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  components:
    - ../../../components/volsync
  dependsOn:
    - name: media
  timeout: 5m
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  postBuild:
    substituteFrom:
      - kind: Secret
        name: volsync-s3-credentials
    substitute:
      APP: plex
      VOLSYNC_CLAIM: config-plex-0
      VOLSYNC_SCHEDULE: "0 3 * * *"
      VOLSYNC_NAMESPACE: media
