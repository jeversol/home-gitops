apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: media-prowlarr
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/media/prowlarr
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: media
  timeout: 5m
  decryption:
    provider: sops
    secretRef:
      name: sops-age
