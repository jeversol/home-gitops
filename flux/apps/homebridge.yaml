apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: homebridge
  namespace: flux-system
spec:
  interval: 1h
  path: ./apps/homebridge
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  components:
    - ../../components/volsync
  wait: true
  timeout: 5m
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  postBuild:
    substituteFrom:
      - kind: Secret
        name: volsync-s3-credentials
    substitute:
      APP: homebridge
      VOLSYNC_CLAIM: storage-homebridge-0
      VOLSYNC_SCHEDULE: "0 1 * * *"
      VOLSYNC_NAMESPACE: homebridge
