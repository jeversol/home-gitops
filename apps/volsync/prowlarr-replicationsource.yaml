apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: prowlarr
  namespace: media
spec:
  sourcePVC: config-prowlarr-0
  trigger:
    schedule: "30 4 * * *"
  restic:
    repository: prowlarr-volsync-restic
    copyMethod: Clone
    storageClassName: linstor-r1
    pruneIntervalDays: 7
    retain:
      daily: 7
      weekly: 4
    moverSecurityContext:
      runAsUser: 1029
      runAsGroup: 65537
      fsGroup: 65537
