apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: radarr
  namespace: media
spec:
  sourcePVC: config-radarr-0
  trigger:
    schedule: "0 4 * * *"
  restic:
    repository: radarr-volsync-restic
    copyMethod: Clone
    storageClassName: linstor-r3
    pruneIntervalDays: 7
    retain:
      daily: 7
      weekly: 4
    moverSecurityContext:
      runAsUser: 1029
      runAsGroup: 65537
      fsGroup: 65537
