apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: scrutiny
  namespace: o11y
spec:
  sourcePVC: config-scrutiny-0
  trigger:
    schedule: "0 6 * * *"
  restic:
    repository: scrutiny-volsync-restic
    copyMethod: Clone
    storageClassName: linstor-r3
    pruneIntervalDays: 7
    retain:
      daily: 7
      weekly: 4
