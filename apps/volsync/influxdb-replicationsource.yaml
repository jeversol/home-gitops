apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: influxdb
  namespace: o11y
spec:
  sourcePVC: influxdb
  trigger:
    schedule: "30 6 * * *"
  restic:
    repository: influxdb-volsync-restic
    copyMethod: Clone
    storageClassName: linstor-r3
    pruneIntervalDays: 7
    retain:
      daily: 7
      weekly: 4
    moverSecurityContext:
      runAsUser: 1000
