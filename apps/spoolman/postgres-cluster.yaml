apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: spoolman-postgres
  namespace: spoolman
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:17.5

  storage:
    size: 2Gi
    storageClass: linstor-r3

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: spoolman-postgres-store

  monitoring:
    enablePodMonitor: true

  bootstrap:
    recovery:
      source: spoolman-postgres

  externalClusters:
    - name: spoolman-postgres
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: spoolman-postgres-store
          serverName: spoolman-postgres
