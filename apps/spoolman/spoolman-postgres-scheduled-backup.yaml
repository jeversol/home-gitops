apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: spoolman-postgres-daily
  namespace: spoolman
spec:
  schedule: "0 30 3 * * *"
  backupOwnerReference: self
  cluster:
    name: spoolman-postgres
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
