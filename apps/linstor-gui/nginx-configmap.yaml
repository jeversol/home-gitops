apiVersion: v1
kind: ConfigMap
metadata:
  name: linstor-gui-nginx
  namespace: piraeus-datastore
data:
  default.conf: |
    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;
        location / {
            try_files $uri $uri/ /index.html;
        }
        location /api {
            proxy_pass http://linstor-controller.piraeus-datastore.svc.cluster.local:3370;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
