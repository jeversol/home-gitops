apiVersion: apps/v1
kind: Deployment
metadata:
  name: linstor-gui
  namespace: piraeus-datastore
spec:
  replicas: 1
  selector:
    matchLabels:
      app: linstor-gui
  template:
    metadata:
      labels:
        app: linstor-gui
    spec:
      initContainers:
        - name: download-gui
          image: alpine:3.20
          command:
            - sh
            - -c
            - |
              wget -qO- https://github.com/linbit/linstor-gui/releases/download/v1.8.2/linstor-gui-v1.8.2.tar.gz \
                | tar -xz -C /web --strip-components=1
          volumeMounts:
            - name: gui-files
              mountPath: /web
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: gui-files
              mountPath: /usr/share/nginx/html
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              memory: 64Mi
      volumes:
        - name: gui-files
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: linstor-gui-nginx
