apiVersion: v1
kind: Secret
metadata:
  name: volsync-secret-${APP}
  namespace: ${VOLSYNC_NAMESPACE}
type: Opaque
stringData:
  RESTIC_REPOSITORY: s3:https://nas.i.recompiled.org:3900/restic/${APP}
  RESTIC_PASSWORD: ${VOLSYNC_RESTIC_PASSWORD}
  AWS_ACCESS_KEY_ID: ${VOLSYNC_S3_ACCESS_KEY_ID}
  AWS_SECRET_ACCESS_KEY: ${VOLSYNC_S3_SECRET_ACCESS_KEY}
